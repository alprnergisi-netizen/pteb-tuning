<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <rect width="200" height="200" fill="#b0b0b0"/>
  <filter id="n" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.75 0.35" numOctaves="5" seed="3"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="1.6" intercept="-0.2"/>
      <feFuncG type="linear" slope="1.6" intercept="-0.2"/>
      <feFuncB type="linear" slope="1.6" intercept="-0.2"/>
    </feComponentTransfer>
  </filter>
  <rect width="200" height="200" filter="url(#n)" opacity="0.9"/>
</svg>
